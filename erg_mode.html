<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERG Mode Controller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

:root {
  --bg:      #0a0c10;
  --panel:   #111418;
  --border:  #1e2530;
  --accent:  #00e5ff;
  --green:   #00ff88;
  --red:     #ff3c5a;
  --amber:   #ffb300;
  --purple:  #b070ff;
  --text:    #d0dae8;
  --muted:   #4a5568;
  --mono:    'Share Tech Mono', monospace;
  --sans:    'Barlow', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 60px;
}
body::before {
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}

.container{position:relative;z-index:1;width:100%;max-width:920px;}

header{display:flex;align-items:baseline;gap:16px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:14px;}
header h1{font-family:var(--mono);font-size:1.4rem;color:var(--accent);letter-spacing:.08em;}
header span{font-size:.7rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

/* ── Device card ── */
.device-card{
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .4s;
  margin-bottom:16px;
}
.device-card.live{border-color:var(--green);}
.device-card.live .dc-bar{background:var(--green);}

.dc-top{display:flex;align-items:center;justify-content:space-between;}
.dc-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);}
.dc-name{font-family:var(--mono);font-size:.78rem;color:var(--text);}
.dc-bar{height:2px;background:var(--border);border-radius:1px;transition:background .4s;}
.dc-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.75rem;}

.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s;}
.dot.live      {background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.connecting{background:var(--amber);animation:pulse 1s infinite;}
.dot.error     {background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

.dc-btns{display:flex;gap:6px;flex-wrap:wrap;}
.btn{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;
  border:1px solid currentColor;border-radius:4px;padding:5px 12px;
  cursor:pointer;background:transparent;transition:background .15s,color .15s;text-transform:uppercase;
}
.btn:disabled{opacity:.25;cursor:not-allowed;}
.btn-scan{color:var(--accent);}
.btn-scan:not(:disabled):hover{background:var(--accent);color:var(--bg);}
.btn-forget{color:var(--muted);}
.btn-forget:not(:disabled):hover{color:var(--red);border-color:var(--red);}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}

.metric-card{
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:16px 10px 12px;text-align:center;position:relative;overflow:hidden;transition:border-color .4s;
}
.metric-card.live{border-color:var(--green);}
.mbar{position:absolute;bottom:0;left:0;right:0;height:2px;transform:scaleX(0);transform-origin:left;transition:transform .5s ease;}
.metric-card.live .mbar{transform:scaleX(1);}
.mbar-pwr{background:var(--accent);}
.mbar-cad{background:var(--green);}
.mbar-hr {background:var(--red);}

.metric-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:6px;}
.metric-value{font-family:var(--mono);font-size:2.6rem;line-height:1;transition:color .3s;}
.metric-value.pwr{color:var(--accent);}
.metric-value.cad{color:var(--green);}
.metric-value.hr {color:var(--red);}
.metric-value.dim{color:var(--muted);}
.metric-unit{font-size:.6rem;color:var(--muted);margin-top:3px;letter-spacing:.1em;}

/* ── ERG Control Panel ── */
.erg-panel{
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:16px;margin-bottom:16px;display:flex;flex-direction:column;gap:12px;
}

.erg-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

.erg-input-group{display:flex;align-items:center;gap:8px;}
.erg-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);min-width:80px;}
input[type="number"]{
  font-family:var(--mono);font-size:.9rem;padding:6px 10px;
  background:var(--bg);color:var(--accent);border:1px solid var(--border);
  border-radius:4px;width:100px;
}
input[type="number"]::placeholder{color:var(--muted);}

.erg-btn{
  font-family:var(--mono);font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;
  border:none;border-radius:4px;padding:8px 24px;cursor:pointer;
  background:var(--purple);color:#fff;font-weight:700;
  transition:opacity .2s,transform .1s,background .3s;
}
.erg-btn:disabled{opacity:.25;cursor:not-allowed;}
.erg-btn:not(:disabled):hover{filter:brightness(1.15);}
.erg-btn:active{transform:scale(.97);}
.erg-btn.active{background:var(--red);}

.erg-info{font-family:var(--mono);font-size:.75rem;color:var(--muted);}
.erg-info span{color:var(--accent);font-weight:600;}

/* ── Power Bar (current vs target) ── */
.power-bar-wrap{
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:8px;overflow:hidden;margin-bottom:12px;
}
.power-bar{height:24px;position:relative;background:rgba(0,229,255,.1);border-radius:2px;overflow:hidden;}
.power-bar::before{
  content:'';position:absolute;left:0;top:0;bottom:0;background:var(--accent);
  width:0%;transition:width .3s;
}
.power-label{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:.7rem;color:var(--text);z-index:2;pointer-events:none;
}

/* ── Status log ── */
.log-wrap{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);}
.log-header span{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);}
.btn-clear{color:var(--muted);border-color:var(--muted);padding:3px 9px;font-size:.6rem;}
.btn-clear:hover{color:var(--text);border-color:var(--text);}
#log{font-family:var(--mono);font-size:.68rem;line-height:1.7;color:#7a8a9a;padding:10px 14px;height:150px;overflow-y:auto;display:flex;flex-direction:column-reverse;}
#log .info{color:#7a8a9a;}#log .ok{color:var(--green);}#log .warn{color:var(--amber);}#log .err{color:var(--red);}#log .data{color:var(--accent);}

footer{margin-top:24px;font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-align:center;}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>ERG_MODE</h1>
  <span>Phase 2 — Active Power Control</span>
</header>

<!-- Trainer Device -->
<div class="device-card" id="card-trainer">
  <div class="dc-top">
    <span class="dc-label">Trainer</span>
    <span class="dc-name" id="name-trainer">—</span>
  </div>
  <div class="dc-bar"></div>
  <div class="dc-status"><div class="dot" id="dot-trainer"></div><span id="lbl-trainer">Initialising…</span></div>
  <div class="dc-btns">
    <button class="btn btn-scan"   id="btn-scan-trainer" onclick="manualConnect()">Scan</button>
    <button class="btn btn-forget" id="btn-forget-trainer" onclick="forgetDevice()" disabled>Forget</button>
  </div>
</div>

<!-- Live Metrics -->
<div class="metrics">
  <div class="metric-card" id="mc-pwr">
    <div class="metric-label">Power</div>
    <div class="metric-value pwr dim" id="val-pwr">—</div>
    <div class="metric-unit">watts</div>
    <div class="mbar mbar-pwr"></div>
  </div>
  <div class="metric-card" id="mc-cad">
    <div class="metric-label">Cadence</div>
    <div class="metric-value cad dim" id="val-cad">—</div>
    <div class="metric-unit">rpm</div>
    <div class="mbar mbar-cad"></div>
  </div>
  <div class="metric-card" id="mc-hr">
    <div class="metric-label">Heart Rate</div>
    <div class="metric-value hr dim" id="val-hr">—</div>
    <div class="metric-unit">bpm</div>
    <div class="mbar mbar-hr"></div>
  </div>
</div>

<!-- ERG Control Panel -->
<div class="erg-panel" id="erg-panel" style="display:none">
  <div class="erg-row">
    <div class="erg-input-group">
      <span class="erg-label">Target Power</span>
      <input type="number" id="target-power" min="50" max="2000" placeholder="watts" onchange="setTargetPower()">
      <span style="color:var(--muted);font-size:.75rem;">W</span>
    </div>
    <button class="erg-btn" id="btn-erg" onclick="toggleERG()">Start ERG</button>
  </div>

  <div style="border-top:1px solid var(--border);padding-top:8px;">
    <div class="erg-label" style="margin-bottom:6px;">Power Progress</div>
    <div class="power-bar-wrap">
      <div class="power-bar" id="power-bar">
        <div class="power-label" id="power-label">— / — W</div>
      </div>
    </div>
  </div>

  <div class="erg-info" style="border-top:1px solid var(--border);padding-top:8px;">
    Status: <span id="erg-status">Not active</span>
    <br>Messages sent: <span id="msg-count">0</span>
    <br>Last update: <span id="last-update">—</span>
  </div>
</div>

<!-- Log -->
<div class="log-wrap">
  <div class="log-header">
    <span>Event Log</span>
    <button class="btn btn-clear" onclick="clearLog()">Clear</button>
  </div>
  <div id="log"></div>
</div>

<footer>gafferlloyd/erg_controller &nbsp;·&nbsp; Web Bluetooth API &nbsp;·&nbsp; Chrome required</footer>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
//  GATT UUIDs
// ═══════════════════════════════════════════════
const UUID = {
  CPS_SERVICE:0x1818, CPS_MEASUREMENT:0x2A63,
  FTMS_SERVICE:0x1826, 
  FTMS_INDOOR_BIKE:0x2AD2,
  FTMS_CONTROL_POINT:0x2AD8,
  FTMS_MACHINE_STATUS:0x2AD3,
  HR_SERVICE:0x180D, HR_MEASUREMENT:0x2A37,
};

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let trainerDevice=null;
let trainerLive=false;
let ergActive=false;
let targetPower=null;
let currentPower=null, currentCadence=null, currentHR=null;
let msgsSent=0;
let prevCrankRevs=null, prevCrankTime=null;
let ftmsControlChar=null, ftmsStatusChar=null;

// ═══════════════════════════════════════════════
//  Logging
// ═══════════════════════════════════════════════
function log(msg,cls='info'){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className=cls;
  d.textContent=`[${new Date().toTimeString().slice(0,8)}] ${msg}`;
  el.prepend(d);
}
function clearLog(){document.getElementById('log').innerHTML='';}

// ═══════════════════════════════════════════════
//  Device UI
// ═══════════════════════════════════════════════
function setDevUI(dotCls, label, name, live){
  document.getElementById('dot-trainer').className=`dot ${dotCls}`;
  document.getElementById('lbl-trainer').textContent=label;
  if(name) document.getElementById('name-trainer').textContent=name;
  document.getElementById('card-trainer').classList.toggle('live',live);
  document.getElementById('btn-forget-trainer').disabled=!live;
  document.getElementById('erg-panel').style.display=live?'flex':'none';
  if(!live) stopERG();
}

// ═══════════════════════════════════════════════
//  localStorage — remember device
// ═══════════════════════════════════════════════
const saveDevice  =name=>localStorage.setItem('ble_trainer',name);
const forgetSaved =()=>localStorage.removeItem('ble_trainer');
const savedName   =()=>localStorage.getItem('ble_trainer');

// ═══════════════════════════════════════════════
//  Auto-connect on load
// ═══════════════════════════════════════════════
async function autoConnect(){
  if(!navigator.bluetooth){
    log('Web Bluetooth unavailable — use Chrome','err');
    setDevUI('error','Unavailable','',false);
    return;
  }
  log('Checking for previously paired devices…');

  let knownDevices=[];
  try{ knownDevices=await navigator.bluetooth.getDevices(); }
  catch(e){ log('getDevices() unsupported — use Scan','warn'); }

  const tn=savedName();
  const td=knownDevices.find(d=>d.name===tn);
  if(td){
    log(`Reconnecting trainer: ${tn}`);
    setDevUI('connecting','Connecting…',tn,false);
    connectTrainer(td);
  } else {
    setDevUI('',tn?`Not in range — click Scan`:'Click Scan to pair first',tn||'',false);
  }
}

// ═══════════════════════════════════════════════
//  Manual scan
// ═══════════════════════════════════════════════
async function manualConnect(){
  if(!navigator.bluetooth) return;
  try{
    setDevUI('connecting','Scanning…','',false);
    const dev=await navigator.bluetooth.requestDevice({
      filters:[
        {services:[UUID.FTMS_SERVICE]},
        {namePrefix:'KICKR'},{namePrefix:'Wahoo'},
      ],
      optionalServices:[UUID.FTMS_SERVICE,UUID.HR_SERVICE],
    });
    saveDevice(dev.name);
    connectTrainer(dev);
  } catch(e){
    log(`Scan cancelled: ${e.message}`,'warn');
    const n=savedName()||'';
    setDevUI('',n?'Not in range — click Scan':'Click Scan to pair first',n,false);
  }
}

function forgetDevice(){
  forgetSaved();
  try{if(trainerDevice?.gatt?.connected)trainerDevice.gatt.disconnect();}catch(_){}
  trainerDevice=null;trainerLive=false;
  ftmsControlChar=null;ftmsStatusChar=null;
  setDevUI('','Click Scan to pair first','',false);
  document.getElementById('mc-pwr').classList.remove('live');
  document.getElementById('mc-cad').classList.remove('live');
  document.getElementById('mc-hr').classList.remove('live');
  document.getElementById('val-pwr').textContent='—';
  document.getElementById('val-cad').textContent='—';
  document.getElementById('val-hr').textContent='—';
  log('Trainer forgotten','warn');
}

// ═══════════════════════════════════════════════
//  Trainer connect (with retry)
// ═══════════════════════════════════════════════
async function connectTrainer(dev, attempt=1){
  trainerDevice=dev;
  if(attempt===1){
    dev.addEventListener('gattserverdisconnected',()=>{
      trainerLive=false;
      ftmsControlChar=null;ftmsStatusChar=null;
      setDevUI('connecting','Disconnected — retrying…',dev.name,false);
      log('Trainer disconnected — reconnecting…','warn');
      stopERG();
      setTimeout(()=>connectTrainer(dev),2500);
    });
  }
  try{
    const server=await dev.gatt.connect();
    log(`Trainer GATT connected (attempt ${attempt})`,'ok');

    const svc=await server.getPrimaryService(UUID.FTMS_SERVICE);
    
    // Get control point and status characteristics
    try{
      ftmsControlChar=await svc.getCharacteristic(UUID.FTMS_CONTROL_POINT);
      log('Found FTMS Control Point','ok');
    }catch(_){log('FTMS Control Point not available','warn');}

    try{
      ftmsStatusChar=await svc.getCharacteristic(UUID.FTMS_MACHINE_STATUS);
      ftmsStatusChar.addEventListener('characteristicvaluechanged',onMachineStatus);
      await ftmsStatusChar.startNotifications();
      log('Subscribed: FTMS Machine Status','ok');
    }catch(_){log('FTMS Machine Status not available','warn');}

    // Also subscribe to power/cadence data
    try{
      const indoorBikeChar=await svc.getCharacteristic(UUID.FTMS_INDOOR_BIKE);
      indoorBikeChar.addEventListener('characteristicvaluechanged',onFTMS);
      await indoorBikeChar.startNotifications();
      log('Subscribed: FTMS Indoor Bike Data','ok');
    }catch(_){log('FTMS Indoor Bike data not available','warn');}

    if(ftmsControlChar){
      trainerLive=true;
      setDevUI('live','Live',dev.name,true);
    } else {
      setDevUI('error','No control point',dev.name,false);
    }
  }catch(e){
    log(`Trainer connect failed (attempt ${attempt}): ${e.message}`,'err');
    if(attempt<3) setTimeout(()=>connectTrainer(dev,attempt+1),1500);
    else setDevUI('error','Failed — click Scan',dev.name,false);
  }
}

// ═══════════════════════════════════════════════
//  Data parsers
// ═══════════════════════════════════════════════
function onFTMS(event){
  const d=event.target.value;
  const flags=d.getUint16(0,true);
  let o=2;
  
  // Speed
  if(!(flags&0x01))o+=2;
  
  // Average speed
  if(flags&0x02)o+=2;
  
  // Cadence
  if(flags&0x04){
    currentCadence=Math.round(d.getUint16(o,true)*.5);
    o+=2;
    setMetric('cad',currentCadence,'rpm');
    document.getElementById('mc-cad').classList.add('live');
  }
  
  // Average cadence
  if(flags&0x08)o+=2;
  
  // Distance
  if(flags&0x10)o+=3;
  
  // Resistance level
  if(flags&0x20)o+=2;
  
  // Power
  if(flags&0x40){
    currentPower=d.getInt16(o,true);
    o+=2;
    setMetric('pwr',currentPower,'W');
    document.getElementById('mc-pwr').classList.add('live');
    updatePowerBar();
  }
  
  // Energy
  if(flags&0x80)o+=2;
}

function onMachineStatus(event){
  const d=event.target.value;
  const status=d.getUint8(0);
  const flags=d.getUint16(1,true);
  
  const statusStr=['Reserved','Asleep','Ready','In Use','Paused'][status&0x07]||'Unknown';
  const feFlags=((flags>>8)&0xFF);
  
  if(feFlags&0x01){
    log(`Machine Status: ${statusStr} | Power limit reached`,'warn');
  }
}

function setMetric(id,val,unit){
  const el=document.getElementById(`val-${id}`);
  el.textContent=val;
  el.classList.remove('dim');
}

// ═══════════════════════════════════════════════
//  ERG Mode Control
// ═══════════════════════════════════════════════
async function setTargetPower(){
  const input=document.getElementById('target-power').value;
  if(!input || input<50){
    log('Invalid target power (50-2000W)','warn');
    return;
  }
  targetPower=parseInt(input);
  log(`Target power set to ${targetPower}W`,'ok');
  if(ergActive) sendPowerCommand();
}

async function toggleERG(){
  if(!trainerLive) return;
  if(!ergActive){
    const input=document.getElementById('target-power').value;
    if(!input || input<50){
      log('Set target power first (50-2000W)','warn');
      return;
    }
    startERG();
  } else {
    stopERG();
  }
}

async function startERG(){
  if(!ftmsControlChar || !targetPower){
    log('Cannot start ERG: control char or target missing','err');
    return;
  }
  ergActive=true;
  msgsSent=0;
  document.getElementById('btn-erg').classList.add('active');
  document.getElementById('btn-erg').textContent='■ Stop ERG';
  document.getElementById('erg-status').textContent='Active';
  log(`ERG mode activated — target: ${targetPower}W`,'ok');
  
  // Send initial power command
  await sendPowerCommand();
  
  // Send power updates every 1 second
  window.ergInterval=setInterval(sendPowerCommand,1000);
}

function stopERG(){
  if(!ergActive) return;
  ergActive=false;
  clearInterval(window.ergInterval);
  document.getElementById('btn-erg').classList.remove('active');
  document.getElementById('btn-erg').textContent='Start ERG';
  document.getElementById('erg-status').textContent='Not active';
  log('ERG mode stopped','ok');
}

async function sendPowerCommand(){
  if(!ftmsControlChar || !ergActive || !targetPower) return;
  
  try{
    // FTMS SetTargetPower: [0x05, PowerLow, PowerHigh]
    const cmd=new Uint8Array(3);
    cmd[0]=0x05;  // SetTargetPower op code
    cmd[1]=targetPower&0xFF;
    cmd[2]=(targetPower>>8)&0xFF;
    
    await ftmsControlChar.writeValue(cmd);
    msgsSent++;
    
    document.getElementById('msg-count').textContent=msgsSent;
    document.getElementById('last-update').textContent=new Date().toTimeString().slice(0,8);
  }catch(e){
    log(`Failed to send power command: ${e.message}`,'err');
    stopERG();
  }
}

function updatePowerBar(){
  if(!targetPower || !currentPower) return;
  
  const percent=Math.min(100, (currentPower/targetPower)*100);
  const bar=document.getElementById('power-bar');
  bar.style.setProperty('--progress', percent+'%');
  
  // Update bar width
  const barEl=bar.querySelector(':before');
  if(barEl) barEl.style.width=percent+'%';
  
  // Update label
  const label=document.getElementById('power-label');
  label.textContent=`${currentPower} / ${targetPower} W`;
}

// ═══════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════
window.addEventListener('load',autoConnect);

// Cleanup
window.addEventListener('beforeunload',()=>{
  if(ergActive) stopERG();
  if(trainerDevice?.gatt?.connected) try{trainerDevice.gatt.disconnect();}catch(_){}
});
</script>
</body>
</html>

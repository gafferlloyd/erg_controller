<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KICKR SHIFT ERG Debug</title>
<style>
body { background: #0a0c10; color: #d0dae8; font-family: monospace; padding: 20px; }
button { background: #00e5ff; color: #0a0c10; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; font-weight: bold; }
button:hover { opacity: 0.8; }
.log { background: #111418; border: 1px solid #1e2530; padding: 10px; height: 300px; overflow-y: auto; font-size: 12px; margin-top: 20px; }
.log .ok { color: #00ff88; }
.log .err { color: #ff3c5a; }
.log .data { color: #00e5ff; }
.metrics { font-size: 24px; margin: 20px 0; }
.metrics span { font-size: 48px; font-weight: bold; color: #00e5ff; }
</style>
</head>
<body>
<h1>KICKR SHIFT ERG Mode Test</h1>
<p>1. Click "Connect Trainer" and select your KICKR SHIFT</p>
<p>2. Click "Test ERG Mode" to try setting 100W</p>
<p>3. Check the log for results</p>

<button id="connectBtn">Connect Trainer</button>
<button id="testErgBtn" disabled>Test ERG Mode (100W)</button>
<button id="testSimBtn" disabled>Test Simulation Mode (100W)</button>
<button id="requestControlBtn" disabled>Request Control Only</button>

<div class="metrics">
    Current Power: <span id="power">—</span> W
</div>

<div class="log" id="log"></div>

<script>
'use strict';

const FTMS_SERVICE = "00001826-0000-1000-8000-00805f9b34fb";
const FTMS_INDOOR_BIKE = "00002ad2-0000-1000-8000-00805f9b34fb";
const FTMS_CONTROL_POINT = "00002ad9-0000-1000-8000-00805f9b34fb";

let trainerDevice = null;
let trainerLive = false;
let controlPoint = null;

function log(msg, type = 'info') {
    const logDiv = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = type;
    entry.textContent = `[${new Date().toTimeString().slice(0,8)}] ${msg}`;
    logDiv.appendChild(entry);
    logDiv.scrollTop = logDiv.scrollHeight;
}

async function connectTrainer() {
    try {
        log('Requesting Bluetooth device...');
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: [FTMS_SERVICE] }],
            optionalServices: [FTMS_SERVICE]
        });
        
        trainerDevice = device;
        log(`Connected to: ${device.name}`, 'ok');
        
        const server = await device.gatt.connect();
        log('GATT server connected', 'ok');
        
        const service = await server.getPrimaryService(FTMS_SERVICE);
        log('FTMS service found', 'ok');
        
        // Try to get control point
        try {
            controlPoint = await service.getCharacteristic(FTMS_CONTROL_POINT);
            log('Control point found!', 'ok');
            
            // Enable notifications
            await controlPoint.startNotifications();
            controlPoint.addEventListener('characteristicvaluechanged', handleResponse);
            log('Control point notifications enabled', 'ok');
        } catch(e) {
            log(`Control point not found: ${e.message}`, 'err');
        }
        
        // Subscribe to indoor bike data
        const bikeData = await service.getCharacteristic(FTMS_INDOOR_BIKE);
        await bikeData.startNotifications();
        bikeData.addEventListener('characteristicvaluechanged', handleBikeData);
        log('Subscribed to bike data', 'ok');
        
        trainerLive = true;
        document.getElementById('testErgBtn').disabled = false;
        document.getElementById('testSimBtn').disabled = false;
        document.getElementById('requestControlBtn').disabled = false;
        
    } catch(e) {
        log(`Connection failed: ${e.message}`, 'err');
    }
}

function handleResponse(event) {
    const data = new Uint8Array(event.target.value.buffer);
    log(`Control point response: [${data}]`, 'data');
    
    // Parse response
    const responseCode = data[0];
    const requestOpCode = data[1];
    const resultCode = data[2];
    
    if (responseCode === 0x80) {
        if (resultCode === 0x01) {
            log(`Command ${requestOpCode} succeeded!`, 'ok');
        } else if (resultCode === 0x02) {
            log(`Command ${requestOpCode} rejected - not supported`, 'err');
        } else if (resultCode === 0x04) {
            log(`Command ${requestOpCode} failed - invalid parameter`, 'err');
        }
    }
}

function handleBikeData(event) {
    const data = new Uint8Array(event.target.value.buffer);
    const flags = data[0] | (data[1] << 8);
    let offset = 2;
    
    // Parse power (instantaneous power is often in the data)
    if (flags & 0x01) {
        // More data fields present
        offset += 2;
    }
    if (flags & 0x02) {
        offset += 2;
    }
    if (flags & 0x04) {
        const cadence = data[offset] | (data[offset+1] << 8);
        offset += 2;
    }
    if (flags & 0x08) {
        offset += 2;
    }
    if (flags & 0x10) {
        offset += 3;
    }
    if (flags & 0x20) {
        offset += 2;
    }
    if (flags & 0x40) {
        const power = data[offset] | (data[offset+1] << 8);
        document.getElementById('power').textContent = power;
    }
}

async function requestControl() {
    if (!controlPoint) {
        log('No control point available', 'err');
        return;
    }
    
    try {
        const command = new Uint8Array([0x00]); // Request Control
        await controlPoint.writeValue(command);
        log('Sent Request Control command', 'ok');
    } catch(e) {
        log(`Request Control failed: ${e.message}`, 'err');
    }
}

async function testErgMode() {
    if (!controlPoint) {
        log('No control point available', 'err');
        return;
    }
    
    try {
        // First, request control
        log('Step 1: Requesting control...');
        await requestControl();
        await new Promise(r => setTimeout(r, 100));
        
        // Second, set target power to 100W
        log('Step 2: Setting target power to 100W...');
        const targetPower = 100;
        const command = new Uint8Array([
            0x01,  // Set Target Power
            0x00,  // Reserved
            targetPower & 0xFF,
            (targetPower >> 8) & 0xFF
        ]);
        await controlPoint.writeValue(command);
        log(`Sent Set Target Power: ${targetPower}W`, 'ok');
        
    } catch(e) {
        log(`ERG test failed: ${e.message}`, 'err');
    }
}

async function testSimulationMode() {
    if (!controlPoint) {
        log('No control point available', 'err');
        return;
    }
    
    try {
        log('Step 1: Requesting control...');
        await requestControl();
        await new Promise(r => setTimeout(r, 100));
        
        log('Step 2: Setting simulation parameters for 100W...');
        const targetPower = 100;
        // Set Indoor Bike Simulation Parameters
        const command = new Uint8Array([
            0x03,  // Set Simulation Parameters
            0x00,  // Reserved
            0x01, 0x00,  // Flags: ERG mode enabled
            targetPower & 0xFF,
            (targetPower >> 8) & 0xFF,
            0x00, 0x00,  // Wind speed
            0x00, 0x00,  // Grade
            0x00, 0x00,  // Rolling resistance
            0x00, 0x00   // Wind resistance
        ]);
        await controlPoint.writeValue(command);
        log(`Sent Simulation Mode: ${targetPower}W`, 'ok');
        
    } catch(e) {
        log(`Simulation test failed: ${e.message}`, 'err');
    }
}

document.getElementById('connectBtn').onclick = connectTrainer;
document.getElementById('testErgBtn').onclick = testErgMode;
document.getElementById('testSimBtn').onclick = testSimulationMode;
document.getElementById('requestControlBtn').onclick = requestControl;
</script>
</body>
</html>

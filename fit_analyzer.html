<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIT Analyzer</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Page overrides ─────────────────────────────────── */
    html, body { overflow: hidden; }

    /* ── Drop zone ──────────────────────────────────────── */
    #drop-zone {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 2px dashed var(--border2);
      background: var(--surface);
      cursor: pointer; gap: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    #drop-zone.drag-over { border-color: var(--blue2); background: rgba(31,111,235,0.12); }
    #drop-zone .drop-icon { font-size: 48px; opacity: 0.4; }
    #drop-zone .drop-hint { color: var(--muted); font-size: 13px; }
    #drop-zone input[type=file] { display: none; }
    #drop-zone label {
      background: var(--surface); border: 1px solid var(--border2);
      color: var(--text); padding: 6px 16px; cursor: pointer;
      font-family: var(--mono); font-size: 11px;
    }
    #drop-zone label:hover { background: var(--border2); }

    /* ── Chart area ─────────────────────────────────────── */
    #chart-area {
      flex: 1; min-height: 0; display: flex;
      flex-direction: column; gap: 6px;
    }

    /* ── Plot panel: canvas + values panel ──────────────── */
    .plot-panel {
      flex: 6; min-height: 0;
      display: grid; grid-template-columns: 1fr 152px;
      gap: 6px;
    }
    #plot-canvas {
      display: block; width: 100%; height: 100%;
      background: var(--bg); cursor: crosshair;
    }
    .plot-canvas-wrap {
      background: var(--surface); border: 1px solid var(--border);
      overflow: hidden; min-height: 0;
    }

    /* ── Values panel ───────────────────────────────────── */
    .fit-values-panel {
      display: flex; flex-direction: column; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 8px; overflow-y: auto; min-height: 0;
    }
    .fit-values-panel .cv-lbl { white-space: nowrap; }
    #ftp-indicator {
      font-size: 9px; color: var(--muted); padding: 2px 0;
      border-bottom: 1px solid var(--border); margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Summary area ───────────────────────────────────── */
    .summary-panel {
      flex: 4; min-height: 0;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .summary-head {
      font-size: 9px; letter-spacing: 0.12em; color: var(--muted);
      text-transform: uppercase; padding: 3px 8px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; flex-shrink: 0;
    }
    #sum-grid {
      flex: 1; display: grid; overflow: hidden;
    }

    /* ── Stat box colour variants for analyzer ──────────── */
    .sv-vam  .stat-num { color: var(--amber); }
    .sv-ef   .stat-num { color: var(--purple); }
    .sv-tss  .stat-num { color: var(--green2); }

    /* ── Selection mode cv-block (shows avg | min · max) ─── */
    .cv-block .cv-range {
      font-size: 9px; color: var(--muted); line-height: 1.3;
    }
  </style>
</head>
<body>

<div class="page-layout">

  <!-- ═══════════════════════════════════════════════════
       SIDEBAR — Profile
       ═══════════════════════════════════════════════════ -->
  <aside class="left-col">

    <div class="sidebar-section sb-only">
      <div class="sidebar-head">Profile</div>
      <div class="profile-row"><label>Rest HR</label>
        <input type="number" id="fa-rest"    value="43"  min="30"  max="80"  step="1"><span>bpm</span></div>
      <div class="profile-row"><label>Max HR</label>
        <input type="number" id="fa-maxhr"   value="173" min="100" max="230" step="1"><span>bpm</span></div>
      <div class="profile-row"><label>Weight</label>
        <input type="number" id="fa-weight"  value="68"  min="40"  max="150" step="0.5"><span>kg</span></div>
      <div class="profile-row"><label>FTP out</label>
        <input type="number" id="fa-ftp-out" value="297" min="50"  max="600" step="5"><span>W</span></div>
      <div class="profile-row"><label>FTP in</label>
        <input type="number" id="fa-ftp-in"  value="250" min="50"  max="600" step="5"><span>W</span></div>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════════════
       MAIN COLUMN
       ═══════════════════════════════════════════════════ -->
  <div class="main-col">

    <!-- ── Drop zone (no file loaded) ──────────────────── -->
    <div id="drop-zone">
      <span class="drop-icon">&#9099;</span>
      <span class="drop-hint">Drop a .fit file here</span>
      <label for="fit-file-input">Browse…</label>
      <input type="file" id="fit-file-input" accept=".fit">
    </div>

    <!-- ── Chart area (shown after file loaded) ─────────── -->
    <div id="chart-area" class="hidden">

      <!-- Plot canvas + values panel -->
      <div class="plot-panel">
        <div class="plot-canvas-wrap">
          <canvas id="plot-canvas"></canvas>
        </div>

        <!-- Hover / selection values -->
        <div class="fit-values-panel" id="values-panel">
          <div id="ftp-indicator">—</div>

          <div class="cv-block pwr" id="vp-power">
            <div class="cv-val">—</div>
            <div class="cv-range"></div>
            <div class="cv-lbl">Power W</div>
          </div>
          <div class="cv-block hr" id="vp-hr">
            <div class="cv-val">—</div>
            <div class="cv-range"></div>
            <div class="cv-lbl">HR bpm</div>
          </div>
          <div class="cv-block cad" id="vp-cadence">
            <div class="cv-val">—</div>
            <div class="cv-range"></div>
            <div class="cv-lbl">Cadence rpm</div>
          </div>
          <div class="cv-block spd" id="vp-speed">
            <div class="cv-val">—</div>
            <div class="cv-range"></div>
            <div class="cv-lbl">Speed km/h</div>
          </div>
          <div class="cv-block" style="--col:var(--purple)" id="vp-wpbpm">
            <div class="cv-val" style="color:var(--purple)">—</div>
            <div class="cv-range"></div>
            <div class="cv-lbl">W/bpm</div>
          </div>
          <div class="cv-block" id="vp-vam" style="display:none">
            <div class="cv-val" style="color:var(--amber)">—</div>
            <div class="cv-range"></div>
            <div class="cv-lbl">VAM m/hr</div>
          </div>
          <div class="cv-block" id="vp-time">
            <div class="cv-val" style="color:var(--muted);font-size:14px">—</div>
            <div class="cv-lbl">Elapsed</div>
          </div>
        </div>
      </div>

      <!-- Executive summary -->
      <div class="summary-panel">
        <div class="summary-head">
          <span id="sum-title">Summary</span>
          <span id="sum-ftpnote" style="color:var(--blue2)"></span>
        </div>
        <div id="sum-grid"></div>
      </div>

    </div><!-- /chart-area -->

  </div><!-- /main-col -->
</div><!-- /page-layout -->

<!-- ── Scripts ──────────────────────────────────────────────────────────────── -->
<script src="js/fit_reader.js"></script>
<script src="js/fit_calc.js"></script>
<script src="js/fit_plot.js"></script>
<script src="js/fit_profile.js"></script>
<script>
'use strict';

// ── App state ─────────────────────────────────────────────────────────────────
let fitData    = null;   // { records, isIndoor, hasAltitude, startMs }
let fitCh      = null;   // channels from buildChannels()
let fitSummary = null;

// ── Drop zone wiring ──────────────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const chartArea = document.getElementById('chart-area');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFit(file);
});
document.getElementById('fit-file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFit(e.target.files[0]);
});

// ── File load ─────────────────────────────────────────────────────────────────
async function loadFit(file) {
  try {
    const buf  = await file.arrayBuffer();
    fitData    = parseFit(buf);
    const ftp  = faGetFtp(fitData.isIndoor);
    fitCh      = buildChannels(fitData.records, fitData.hasAltitude);
    fitSummary = computeSummary(fitData.records, ftp, fitAnalyzerProfile.weight);

    dropZone.classList.add('hidden');
    chartArea.classList.remove('hidden');

    // Show/hide VAM panel
    document.getElementById('vp-vam').style.display =
      fitData.hasAltitude ? '' : 'none';

    // FTP indicator
    document.getElementById('ftp-indicator').textContent =
      `${fitData.isIndoor ? 'Indoor' : 'Outdoor'} FTP: ${ftp}W`;
    document.getElementById('sum-ftpnote').textContent =
      `${fitData.isIndoor ? 'Indoor' : 'Outdoor'} · FTP ${ftp}W`;

    fitPlot.load(fitCh, fitData.hasAltitude);
    renderSummary(fitSummary);
  } catch (e) {
    alert('Could not parse FIT file:\n' + e.message);
  }
}

// ── Profile change callback ───────────────────────────────────────────────────
function onProfileChange() {
  if (!fitData) return;
  const ftp = faGetFtp(fitData.isIndoor);
  fitSummary = computeSummary(fitData.records, ftp, fitAnalyzerProfile.weight);
  renderSummary(fitSummary);
  document.getElementById('ftp-indicator').textContent =
    `${fitData.isIndoor ? 'Indoor' : 'Outdoor'} FTP: ${ftp}W`;
}

// ── Plot callbacks ────────────────────────────────────────────────────────────
fitPlot.onHover = function(idx, vals) {
  const fmt = (v, dp=0) => v != null ? (dp ? v.toFixed(dp) : Math.round(v)) : '—';
  setVP('vp-power',   fmt(vals.power), '');
  setVP('vp-hr',      fmt(vals.hr), '');
  setVP('vp-cadence', fmt(vals.cadence), '');
  setVP('vp-speed',   fmt(vals.speed, 1), '');
  setVP('vp-wpbpm',   fmt(vals.wpbpm, 2), '');
  setVP('vp-vam',     fmt(vals.vam), '');
  const e = vals.elapsed;
  document.querySelector('#vp-time .cv-val').textContent =
    e != null ? fmtElapsed(e) : '—';
};

fitPlot.onSelect = function(i0, i1, stats) {
  const dur = fitCh.elapsed[i1] - fitCh.elapsed[i0];
  const np  = calcNP((fitData.records.slice(i0, i1 + 1)).map(r => r.power ?? 0));
  const ftp = faGetFtp(fitData.isIndoor);

  setVPStat('vp-power',   stats.power,   'W');
  setVPStat('vp-hr',      stats.hr,      'bpm');
  setVPStat('vp-cadence', stats.cadence, 'rpm');
  setVPStat('vp-speed',   stats.speed,   'km/h');
  setVPStat('vp-wpbpm',   stats.wpbpm,   '');
  setVPStat('vp-vam',     stats.vam,     'm/hr');
  document.querySelector('#vp-time .cv-val').textContent = fmtElapsed(dur);

  // Show NP for selection in the power block
  if (np) {
    const extra = document.querySelector('#vp-power .cv-range');
    if (extra) extra.textContent = `NP ${np}W${ftp ? '  IF '+(np/ftp).toFixed(2) : ''}`;
  }
};

// ── Values panel helpers ──────────────────────────────────────────────────────
function setVP(id, val, rangeText) {
  const el = document.getElementById(id);
  if (!el) return;
  el.querySelector('.cv-val').textContent   = val;
  el.querySelector('.cv-range').textContent = rangeText;
}

function setVPStat(id, stat, unit) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!stat) { setVP(id, '—', ''); return; }
  el.querySelector('.cv-val').textContent =
    stat.avg != null ? (Number.isInteger(stat.avg) ? stat.avg : stat.avg) : '—';
  el.querySelector('.cv-range').textContent =
    stat.min != null ? `${Math.round(stat.min)}–${Math.round(stat.max)} ${unit}` : '';
}

function fmtElapsed(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${m}:${String(s).padStart(2,'0')}`;
}

// ── Summary rendering ─────────────────────────────────────────────────────────
const SUM_METRICS = [
  { id: 'duration',    lbl: 'Duration',    cls: '',      fmt: v => fmtElapsed(v),               unit: ''    },
  { id: 'totalWork',   lbl: 'Work',        cls: '',      fmt: v => v,                            unit: 'kJ'  },
  { id: 'avgPwr',      lbl: 'Avg Pwr',     cls: 'sv-pwr',fmt: v => v,                            unit: 'W'   },
  { id: 'np',          lbl: 'NP',          cls: 'sv-np', fmt: v => v,                            unit: 'W'   },
  { id: 'IF',          lbl: 'IF',          cls: '',      fmt: v => v,                            unit: ''    },
  { id: 'TSS',         lbl: 'TSS',         cls: 'sv-tss',fmt: v => v,                            unit: ''    },
  { id: 'wkg',         lbl: 'W/kg',        cls: '',      fmt: v => v,                            unit: ''    },
  { id: 'avgHR',       lbl: 'Avg HR',      cls: 'sv-hr', fmt: v => v,                            unit: 'bpm' },
  { id: 'maxHR',       lbl: 'Max HR',      cls: 'sv-hr', fmt: v => v,                            unit: 'bpm' },
  { id: 'ef',          lbl: 'EF',          cls: 'sv-ef', fmt: v => v,                            unit: 'W/bpm'},
  { id: 'decoupling',  lbl: 'Decouple',    cls: '',      fmt: v => v,                            unit: '%'   },
  { id: 'avgCad',      lbl: 'Avg Cad',     cls: 'sv-cad',fmt: v => v,                            unit: 'rpm' },
  { id: 'distKm',      lbl: 'Distance',    cls: '',      fmt: v => v,                            unit: 'km'  },
  { id: 'avgSpd',      lbl: 'Avg Spd',     cls: '',      fmt: v => v,                            unit: 'km/h'},
  { id: 'elevGain',    lbl: 'Elev',        cls: 'sv-vam',fmt: v => v,                            unit: 'm'   },
  { id: 'avgVAM',      lbl: 'Avg VAM',     cls: 'sv-vam',fmt: v => v,                            unit: 'm/hr'},
  { id: 'peak1min',    lbl: 'Peak 1min',   cls: 'sv-pwr',fmt: v => v,                            unit: 'W'   },
  { id: 'peak5min',    lbl: 'Peak 5min',   cls: 'sv-pwr',fmt: v => v,                            unit: 'W'   },
  { id: 'peak20min',   lbl: 'Peak 20min',  cls: 'sv-pwr',fmt: v => v,                            unit: 'W'   },
];

function renderSummary(s) {
  const grid = document.getElementById('sum-grid');
  // Filter to metrics that have data
  const active = SUM_METRICS.filter(m => s[m.id] != null);

  // Smart-pack grid
  const n  = active.length;
  const wr = grid.getBoundingClientRect();
  const w  = wr.width  || 600;
  const h  = wr.height || 140;
  let best = null, bestScore = Infinity;
  for (let c = 1; c <= Math.min(n, 8); c++) {
    const r = Math.ceil(n / c);
    const waste = c * r - n;
    const aspect = (w / c) / (h / r);
    const score  = waste * 3 + Math.abs(aspect - 1.6);
    if (score < bestScore) { bestScore = score; best = { cols: c, rows: r }; }
  }
  const cols = best ? best.cols : 4;
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows    = `repeat(${Math.ceil(n / cols)}, 1fr)`;

  grid.innerHTML = active.map(m => {
    const val  = m.fmt(s[m.id]);
    return `<div class="stat-box ${m.cls}">
      <div class="stat-lbl" style="font-size:10px">${m.lbl}</div>
      <div class="stat-val" style="font-size:22px">
        <span class="stat-num">${val}</span>
        <span class="stat-unit" style="font-size:11px">${m.unit}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────
faLoadProfile();
faInitProfileListeners();
fitPlot.init(document.getElementById('plot-canvas'));
</script>

</body>
</html>
